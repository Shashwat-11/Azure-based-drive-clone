services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-drive}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-drive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-drive}"]
      interval: 10s
      retries: 5
    restart: unless-stopped
    networks: [drive]

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory-policy volatile-lru --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    networks: [drive]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-drive}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-drive}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: "5"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-test-jwt-secret-key-for-local-only}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      LOG_LEVEL: INFO
      WORKERS: 4
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [drive]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on: [backend]
    restart: unless-stopped
    networks: [drive]

volumes:
  postgres_data:
  redis_data:

networks:
  drive:
