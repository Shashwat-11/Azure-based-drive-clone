version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: /frontend
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "tailwindcss"
        versions: [">=4.0.0"]
      - dependency-name: "typescript"
        versions: [">=7.0.0"]
      - dependency-name: "@eslint/js"
        versions: [">=10.0.0"]
