name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  backend:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      revision: ${{ steps.deploy.outputs.revision }}
      fqdn: ${{ steps.health.outputs.fqdn }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with: { creds: '${{ secrets.AZURE_CREDENTIALS }}' }
      - uses: azure/docker-login@v2
        with: { login-server: '${{ secrets.ACR_LOGIN_SERVER }}', username: '${{ secrets.ACR_USERNAME }}', password: '${{ secrets.ACR_PASSWORD }}' }
      - run: |
          docker build -f backend/Dockerfile.prod -t ${{ secrets.ACR_LOGIN_SERVER }}/drive-backend:${{ github.sha }} backend/
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/drive-backend:${{ github.sha }}
      - name: Deploy to Container App
        id: deploy
        run: |
          az containerapp update \
            --name ca-drive-backend \
            --resource-group rg-drive-production \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/drive-backend:${{ github.sha }} \
            --query properties.latestRevisionName -o tsv > /tmp/revision_name
          echo "revision=$(cat /tmp/revision_name)" >> "$GITHUB_OUTPUT"
      - name: Wait for revision
        timeout-minutes: 5
        run: |
          REVISION_NAME="${{ steps.deploy.outputs.revision }}"
          bash scripts/wait-for-revision.sh ca-drive-backend "$REVISION_NAME"
      - name: Health Check
        id: health
        timeout-minutes: 3
        run: |
          FQDN=$(az containerapp show \
            --name ca-drive-backend \
            --resource-group rg-drive-production \
            --query properties.configuration.ingress.fqdn -o tsv)
          APP_URL="https://${FQDN}"
          echo "Health check target: ${APP_URL}/api/v1/health"
          echo "fqdn=${FQDN}" >> "$GITHUB_OUTPUT"
          bash scripts/health-check.sh "${APP_URL}/api/v1/health" ca-drive-backend

  frontend:
    needs: backend
    runs-on: ubuntu-latest
    environment: production
    outputs:
      revision: ${{ steps.deploy.outputs.revision }}
      fqdn: ${{ steps.health.outputs.fqdn }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with: { creds: '${{ secrets.AZURE_CREDENTIALS }}' }
      - uses: azure/docker-login@v2
        with: { login-server: '${{ secrets.ACR_LOGIN_SERVER }}', username: '${{ secrets.ACR_USERNAME }}', password: '${{ secrets.ACR_PASSWORD }}' }
      - run: |
          BACKEND_FQDN=$(az containerapp show \
            --name ca-drive-backend \
            --resource-group rg-drive-production \
            --query properties.configuration.ingress.fqdn -o tsv)
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://${BACKEND_FQDN}" \
            -f frontend/Dockerfile \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/drive-frontend:${{ github.sha }} \
            frontend/
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/drive-frontend:${{ github.sha }}
      - name: Deploy to Container App
        id: deploy
        run: |
          az containerapp update \
            --name ca-drive-frontend \
            --resource-group rg-drive-production \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/drive-frontend:${{ github.sha }} \
            --query properties.latestRevisionName -o tsv > /tmp/revision_name
          echo "revision=$(cat /tmp/revision_name)" >> "$GITHUB_OUTPUT"
      - name: Wait for revision
        timeout-minutes: 5
        run: |
          REVISION_NAME="${{ steps.deploy.outputs.revision }}"
          bash scripts/wait-for-revision.sh ca-drive-frontend "$REVISION_NAME"
      - name: Health Check
        id: health
        timeout-minutes: 3
        run: |
          FQDN=$(az containerapp show \
            --name ca-drive-frontend \
            --resource-group rg-drive-production \
            --query properties.configuration.ingress.fqdn -o tsv)
          APP_URL="https://${FQDN}"
          echo "Health check target: ${APP_URL}/"
          echo "fqdn=${FQDN}" >> "$GITHUB_OUTPUT"
          bash scripts/health-check.sh "${APP_URL}/" ca-drive-frontend

  summary:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: azure/login@v2
        with: { creds: '${{ secrets.AZURE_CREDENTIALS }}' }
      - name: Deployment summary
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "  Deployment Summary"
          echo "═══════════════════════════════════════════════════════"
          echo ""
          echo "  Backend"
          echo "  ───────"
          echo "  Revision:  ${{ needs.backend.outputs.revision }}"
          echo "  URL:       https://${{ needs.backend.outputs.fqdn }}"
          echo "  Health:    https://${{ needs.backend.outputs.fqdn }}/api/v1/health"
          echo ""
          echo "  Frontend"
          echo "  ────────"
          echo "  Revision:  ${{ needs.frontend.outputs.revision }}"
          echo "  URL:       https://${{ needs.frontend.outputs.fqdn }}"
          echo ""
          echo "  Image tag: ${{ github.sha }}"
          echo "═══════════════════════════════════════════════════════"
